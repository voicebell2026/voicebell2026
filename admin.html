<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBell Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f4f1; color: #2C2318; min-height: 100vh; }

  header {
    background: #2C2318; color: #f5f4f1;
    padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; }
  header span { font-size: 0.75rem; opacity: 0.45; }

  .container { max-width: 680px; margin: 36px auto; padding: 0 20px; }

  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 52px); }
  .card { background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .login-card { width: 100%; max-width: 400px; padding: 36px; }
  .login-card h2 { font-size: 1.1rem; margin-bottom: 6px; }
  .login-card p { color: #999; font-size: 0.85rem; margin-bottom: 24px; }

  label { font-size: 0.78rem; color: #888; display: block; margin-bottom: 5px; font-weight: 500; }
  input[type="text"], input[type="password"], input[type="email"], input[type="date"] {
    width: 100%; padding: 10px 13px; border: 1.5px solid #e0ddd8;
    border-radius: 8px; font-size: 0.88rem; background: #faf9f7;
    outline: none; transition: border-color 0.15s; color: #2C2318;
  }
  input:focus { border-color: #2C2318; background: #fff; }

  button { padding: 10px 18px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  button:hover { opacity: 0.82; }
  .btn-primary { background: #2C2318; color: #fff; }
  .btn-danger  { background: #c0392b; color: #fff; }
  .btn-warning { background: #e67e22; color: #fff; }
  .btn-outline { background: transparent; color: #2C2318; border: 1.5px solid #2C2318; }
  .btn-purple  { background: #7b1fa2; color: #fff; }
  .btn-full { width: 100%; margin-top: 8px; padding: 12px; }

  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; }

  .result-card { margin-top: 16px; display: none; }
  .result-card.show { display: block; }

  .section-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; color: #aaa; text-transform: uppercase; margin-bottom: 12px; }

  /* PC별 라이선스 목록 */
  .license-list { margin-top: 4px; }
  .license-item {
    border: 1.5px solid #e0ddd8; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px; background: #faf9f7;
  }
  .license-item:last-child { margin-bottom: 0; }
  .license-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .license-pc { font-size: 0.78rem; color: #888; word-break: break-all; }
  .license-expiry { font-size: 0.88rem; font-weight: 500; }
  .license-days { font-size: 0.78rem; color: #888; margin-top: 2px; }
  .license-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .license-actions button { padding: 6px 12px; font-size: 0.78rem; }

  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-active  { background: #e8f5e9; color: #2e7d32; }
  .badge-expired { background: #fce4ec; color: #c62828; }
  .badge-pending { background: #fff8e1; color: #f57f17; }

  /* 날짜 변경 */
  .date-edit { margin-top: 10px; display: none; }
  .date-edit.show { display: block; }
  .date-row { display: flex; gap: 8px; margin-top: 6px; }

  .global-actions { display: flex; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #f0ede8; flex-wrap: wrap; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2C2318; color: #fff;
    padding: 11px 22px; border-radius: 8px;
    font-size: 0.85rem; opacity: 0; transition: all 0.25s; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #c0392b; }

  .empty-state { text-align: center; color: #aaa; padding: 24px; font-size: 0.88rem; }
</style>
</head>
<body>

<header>
  <h1>VoiceBell Admin</h1>
  <span>License Management</span>
</header>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="card login-card">
    <h2>관리자 인증</h2>
    <p>Admin Key를 입력하세요</p>
    <label>Admin Key</label>
    <input type="password" id="adminKeyInput" placeholder="Admin Key" style="margin-bottom:14px;" onkeydown="if(event.key==='Enter') login()">
    <button class="btn-primary btn-full" onclick="login()">로그인</button>
  </div>
</div>

<!-- 메인 -->
<div class="container" id="mainArea" style="display:none;">

  <!-- 검색 -->
  <div class="card" style="margin-bottom:16px;">
    <div class="section-label">고객 조회</div>
    <div class="search-row">
      <input type="email" id="searchEmail" placeholder="고객 이메일 입력" onkeydown="if(event.key==='Enter') search()">
      <button class="btn-primary" onclick="search()">조회</button>
    </div>
  </div>

  <!-- 거래 ID 직접 환불 -->
  <div class="card" style="margin-bottom:16px;">
    <div class="section-label">거래 ID로 직접 환불</div>
    <div class="search-row">
      <input type="text" id="directTxId" placeholder="거래 ID 입력 (txn_01xxx...)">
      <button class="btn-danger" onclick="directRefund()">환불</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="card result-card" id="resultCard">
    <div class="section-label">라이선스 목록</div>
    <div class="license-list" id="licenseList"></div>

    <!-- 전체 액션 -->
    <div class="global-actions">
      <button class="btn-primary" onclick="toggleAddLicense()">라이선스 추가</button>
      <button class="btn-warning" onclick="loadTransactions()">Paddle 거래 조회</button>
      <button class="btn-purple" onclick="deleteAll()">데이터 전체 삭제</button>
    </div>

    <!-- Paddle 거래 내역 -->
    <div class="date-edit" id="paddleSection" style="margin-top:16px; padding-top:16px; border-top:1px solid #f0ede8;">
      <div class="section-label" style="margin-bottom:10px;">Paddle 거래 내역</div>
      <div id="transactionList"><div class="empty-state">거래 조회 버튼을 눌러주세요</div></div>
    </div>

    <!-- 라이선스 추가 -->
    <div class="date-edit" id="addLicense" style="margin-top:16px; padding-top:16px; border-top:1px solid #f0ede8;">
      <div class="section-label" style="margin-bottom:10px;">라이선스 추가</div>
      <label>상품 종류</label>
      <select id="addProduct" style="width:100%; padding:10px 13px; border:1.5px solid #e0ddd8; border-radius:8px; font-size:0.88rem; background:#faf9f7; margin-bottom:10px; outline:none;">
        <option value="VoiceBell Monthly">월정액</option>
        <option value="VoiceBell 3-Day Pass">3일 이용권</option>
        <option value="VoiceBell 7-Day Pass">7일 이용권</option>
        <option value="VoiceBell 15-Day Pass">15일 이용권</option>
      </select>
      <label>만료일</label>
      <div class="date-row">
        <input type="date" id="addExpiry" style="flex:1;">
        <button class="btn-primary" onclick="addLicense()">추가</button>
        <button class="btn-outline" onclick="toggleAddLicense()">취소</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://voicebell-license-worker.leina0903.workers.dev';
let KEY = '';
let currentEmail = '';
let currentLicenses = [];

function login() {
  const k = document.getElementById('adminKeyInput').value.trim();
  if (!k) return toast('Admin Key를 입력하세요', true);
  KEY = k;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainArea').style.display = 'block';
  toast('로그인됐어요');
}

async function search() {
  const email = document.getElementById('searchEmail').value.trim().toLowerCase();
  if (!email) return toast('이메일을 입력하세요', true);

  try {
    const res = await fetch(`${WORKER}/admin/get?email=${encodeURIComponent(email)}`, {
      headers: { 'X-Admin-Key': KEY }
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);

    const data = await res.json();
    if (!data.found) {
      // 고객 없어도 라이선스 추가 가능하게 빈 상태로 표시
      currentEmail = email;
      currentLicenses = [];
      renderLicenses();
      document.getElementById('resultCard').classList.add('show');
      toast('등록된 라이선스가 없어요. 추가할 수 있어요.');
      return;
    }

    currentEmail = email;
    currentLicenses = data.licenses ?? [];
    renderLicenses();
    document.getElementById('resultCard').classList.add('show');

  } catch(e) {
    toast('조회 중 오류가 발생했어요', true);
  }
}

function renderLicenses() {
  const list = document.getElementById('licenseList');
  const now = new Date();

  if (currentLicenses.length === 0) {
    list.innerHTML = '<div class="empty-state">라이선스가 없어요</div>';
    return;
  }

  list.innerHTML = currentLicenses.map((l, i) => {
    const expiry = new Date(l.expiresAt);
    const isValid = expiry > now;
    const daysLeft = Math.ceil((expiry - now) / (1000*60*60*24));
    const isPending = !l.pcId;

    const badge = isPending
      ? '<span class="badge badge-pending">⏳ 미등록</span>'
      : isValid
        ? '<span class="badge badge-active">✅ 활성</span>'
        : '<span class="badge badge-expired">❌ 만료</span>';

    const pcText = l.pcId ? `PC: ${l.pcId.substring(0, 24)}...` : 'PC 미등록 (결제 완료, 첫 실행 대기)';
    const expiryText = expiry.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
    const daysText = isValid ? `D-${daysLeft}` : '만료됨';
    const productText = l.product ?? '알 수 없음';

    return `
      <div class="license-item" id="license-${i}">
        <div class="license-header">
          <div><strong>#${i+1}</strong> &nbsp; ${badge}</div>
          <div style="font-size:0.8rem; color:#888;">${productText}</div>
        </div>
        <div class="license-pc">${pcText}</div>
        <div class="license-expiry">${expiryText}</div>
        <div class="license-days">${daysText}</div>
        <div class="license-actions">
          ${l.pcId ? `<button class="btn-warning" onclick="resetPc('${l.pcId}', ${i})">PC 초기화</button>` : ''}
          <button class="btn-outline" onclick="toggleDateEdit(${i})">만료일 변경</button>
          <button class="btn-danger" onclick="expireOne('${l.pcId}', ${i})">즉시 만료</button>
        </div>
        <div class="date-edit" id="dateEdit-${i}">
          <label>새 만료일</label>
          <div class="date-row">
            <input type="date" id="newExpiry-${i}" value="${expiry.toISOString().substring(0,10)}" style="flex:1;">
            <button class="btn-primary" onclick="updateExpiry('${l.pcId}', ${i})">저장</button>
            <button class="btn-outline" onclick="toggleDateEdit(${i})">취소</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleDateEdit(i) {
  document.getElementById(`dateEdit-${i}`).classList.toggle('show');
}

async function resetPc(pcId, i) {
  if (!confirm(`PC ID를 초기화할까요?`)) return;
  try {
    const res = await fetch(`${WORKER}/admin/reset-pc`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail, pcId })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) { toast('PC ID가 초기화됐어요'); search(); }
    else toast('초기화 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function updateExpiry(pcId, i) {
  const dateVal = document.getElementById(`newExpiry-${i}`).value;
  if (!dateVal) return toast('날짜를 선택하세요', true);
  const expiresAt = new Date(dateVal + 'T23:59:59.000Z').toISOString();
  try {
    const res = await fetch(`${WORKER}/admin/set-expiry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail, pcId: pcId || null, expiresAt })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) { toast('만료일이 변경됐어요'); search(); }
    else toast('변경 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function expireOne(pcId, i) {
  if (!confirm('이 라이선스를 즉시 만료할까요?')) return;
  const expiresAt = new Date(0).toISOString();
  try {
    const res = await fetch(`${WORKER}/admin/set-expiry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail, pcId: pcId || null, expiresAt })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) { toast('즉시 만료 처리됐어요'); search(); }
    else toast('처리 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function directRefund() {
  const txId = document.getElementById('directTxId').value.trim();
  if (!txId) return toast('거래 ID를 입력하세요', true);
  if (!confirm(`거래 ID: ${txId}\n\n환불 처리할까요?`)) return;
  try {
    const res = await fetch(`${WORKER}/admin/refund`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ transactionId: txId, reason: 'Customer request' })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) {
      toast('환불 처리됐어요');
      document.getElementById('directTxId').value = '';
    } else toast('환불 실패: ' + JSON.stringify(data.data?.error ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function loadTransactions() {
  document.getElementById('transactionList').innerHTML = '<div class="empty-state">조회 중...</div>';
  document.getElementById('paddleSection').classList.add('show');
  try {
    const res = await fetch(`${WORKER}/admin/transactions?email=${encodeURIComponent(currentEmail)}`, {
      headers: { 'X-Admin-Key': KEY }
    });
    const result = await res.json();
    const txList = result.data?.data ?? [];

    if (txList.length === 0) {
      document.getElementById('transactionList').innerHTML = '<div class="empty-state">거래 내역이 없어요</div>';
      return;
    }

    document.getElementById('transactionList').innerHTML = txList.map(tx => {
      const date = new Date(tx.billed_at ?? tx.created_at).toLocaleDateString('ko-KR');
      const amount = tx.details?.totals?.grand_total ?? '-';
      const currency = tx.currency_code ?? '';
      const status = tx.status;
      const subId = tx.subscription_id ?? null;

      return `
        <div class="license-item" style="margin-bottom:8px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div style="font-size:0.85rem; font-weight:600;">${date} · ${amount} ${currency}</div>
              <div style="font-size:0.75rem; color:#888; margin-top:2px;">상태: ${status} · ID: ${tx.id.substring(0,20)}...</div>
              ${subId ? `<div style="font-size:0.75rem; color:#888;">구독 ID: ${subId.substring(0,20)}...</div>` : ''}
            </div>
          </div>
          <div style="display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;">
            <button class="btn-danger" style="padding:6px 12px; font-size:0.78rem;" onclick="refund('${tx.id}')">환불</button>
            ${subId ? `<button class="btn-warning" style="padding:6px 12px; font-size:0.78rem;" onclick="cancelSub('${subId}')">구독 취소</button>` : ''}
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('transactionList').innerHTML = '<div class="empty-state">조회 중 오류가 발생했어요</div>';
  }
}

async function cancelSub(subscriptionId) {
  if (!confirm('구독을 즉시 취소할까요?')) return;
  try {
    const res = await fetch(`${WORKER}/admin/cancel-subscription`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ subscriptionId })
    });
    const data = await res.json();
    if (data.success) toast('구독이 취소됐어요');
    else toast('취소 실패: ' + JSON.stringify(data.data?.error ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function refund(transactionId) {
  if (!confirm('이 거래를 환불할까요?')) return;
  try {
    const res = await fetch(`${WORKER}/admin/refund`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ transactionId, reason: 'Customer request' })
    });
    const data = await res.json();
    if (data.success) { toast('환불 처리됐어요'); loadTransactions(); }
    else toast('환불 실패: ' + JSON.stringify(data.data?.error ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

function toggleAddLicense() {
  document.getElementById('addLicense').classList.toggle('show');
  // 기본 만료일 오늘 + 30일
  if (!document.getElementById('addExpiry').value) {
    const d = new Date();
    d.setDate(d.getDate() + 30);
    document.getElementById('addExpiry').value = d.toISOString().substring(0,10);
  }
}

async function addLicense() {
  const product = document.getElementById('addProduct').value;
  const dateVal = document.getElementById('addExpiry').value;
  if (!dateVal) return toast('만료일을 선택하세요', true);
  const expiresAt = new Date(dateVal + 'T23:59:59.000Z').toISOString();

  try {
    const res = await fetch(`${WORKER}/admin/add-license`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail, product, expiresAt })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) {
      toast('라이선스가 추가됐어요');
      document.getElementById('addLicense').classList.remove('show');
      search();
    } else toast('추가 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function deleteAll() {
  if (!confirm(`${currentEmail}의 모든 데이터를 완전히 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  try {
    const res = await fetch(`${WORKER}/admin/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) {
      toast('데이터가 완전히 삭제됐어요');
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('searchEmail').value = '';
    } else toast('삭제 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}
</script>
</body>
</html>
