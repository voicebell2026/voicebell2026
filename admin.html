<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBell Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f4f1; color: #2C2318; min-height: 100vh; }

  header {
    background: #2C2318; color: #f5f4f1;
    padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; }
  header span { font-size: 0.75rem; opacity: 0.45; }

  .container { max-width: 680px; margin: 36px auto; padding: 0 20px; }

  /* 로그인 */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 52px); }
  .card { background: #fff; border-radius: 14px; padding: 36px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .login-card { width: 100%; max-width: 400px; }
  .login-card h2 { font-size: 1.1rem; margin-bottom: 6px; }
  .login-card p { color: #999; font-size: 0.85rem; margin-bottom: 24px; }

  label { font-size: 0.78rem; color: #888; display: block; margin-bottom: 5px; font-weight: 500; }
  input[type="text"], input[type="password"], input[type="email"], input[type="date"] {
    width: 100%; padding: 10px 13px; border: 1.5px solid #e0ddd8;
    border-radius: 8px; font-size: 0.88rem; background: #faf9f7;
    outline: none; transition: border-color 0.15s; color: #2C2318;
  }
  input:focus { border-color: #2C2318; background: #fff; }

  button { padding: 10px 18px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  button:hover { opacity: 0.82; }
  .btn-primary { background: #2C2318; color: #fff; }
  .btn-danger  { background: #c0392b; color: #fff; }
  .btn-warning { background: #e67e22; color: #fff; }
  .btn-outline { background: transparent; color: #2C2318; border: 1.5px solid #2C2318; }
  .btn-full { width: 100%; margin-top: 8px; padding: 12px; }

  /* 검색 */
  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; }

  /* 결과 카드 */
  .result-card { margin-top: 16px; display: none; }
  .result-card.show { display: block; }

  .section-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; color: #aaa; text-transform: uppercase; margin-bottom: 12px; }

  .info-grid { display: grid; grid-template-columns: 110px 1fr; gap: 0; }
  .info-row { display: contents; }
  .info-row > span { padding: 10px 0; border-bottom: 1px solid #f0ede8; font-size: 0.88rem; }
  .info-row > span:first-child { color: #888; }
  .info-row > span:last-child { font-weight: 500; word-break: break-all; }
  .info-row:last-child > span { border-bottom: none; }

  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-active  { background: #e8f5e9; color: #2e7d32; }
  .badge-expired { background: #fce4ec; color: #c62828; }

  .actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }

  /* 날짜 변경 영역 */
  .date-edit { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0ede8; display: none; }
  .date-edit.show { display: block; }
  .date-row { display: flex; gap: 8px; margin-top: 8px; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2C2318; color: #fff;
    padding: 11px 22px; border-radius: 8px;
    font-size: 0.85rem; opacity: 0; transition: all 0.25s; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #c0392b; }
</style>
</head>
<body>

<header>
  <h1>VoiceBell Admin</h1>
  <span>License Management</span>
</header>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="card login-card">
    <h2>관리자 인증</h2>
    <p>Admin Key를 입력하세요</p>
    <label>Admin Key</label>
    <input type="password" id="adminKeyInput" placeholder="Admin Key" style="margin-bottom:14px;" onkeydown="if(event.key==='Enter') login()">
    <button class="btn-primary btn-full" onclick="login()">로그인</button>
  </div>
</div>

<!-- 메인 -->
<div class="container" id="mainArea" style="display:none;">

  <!-- 검색 -->
  <div class="card" style="margin-bottom:16px;">
    <div class="section-label">고객 조회</div>
    <div class="search-row">
      <input type="email" id="searchEmail" placeholder="고객 이메일 입력" onkeydown="if(event.key==='Enter') search()">
      <button class="btn-primary" onclick="search()">조회</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="card result-card" id="resultCard">
    <div class="section-label">고객 정보</div>

    <div class="info-grid">
      <div class="info-row">
        <span>이메일</span>
        <span id="resEmail">-</span>
      </div>
      <div class="info-row">
        <span>상태</span>
        <span id="resBadge">-</span>
      </div>
      <div class="info-row">
        <span>만료일</span>
        <span id="resExpiry">-</span>
      </div>
      <div class="info-row">
        <span>잔여일</span>
        <span id="resDaysLeft">-</span>
      </div>
      <div class="info-row">
        <span>PC ID</span>
        <span id="resPcId" style="font-size:0.78rem;">-</span>
      </div>
    </div>

    <!-- 액션 버튼 -->
    <div class="actions">
      <button class="btn-outline" onclick="toggleDateEdit()">만료일 변경</button>
      <button class="btn-warning" onclick="resetPc()">PC 초기화</button>
      <button class="btn-danger" onclick="expireNow()">즉시 만료</button>
    </div>

    <!-- 만료일 변경 -->
    <div class="date-edit" id="dateEdit">
      <label>새 만료일</label>
      <div class="date-row">
        <input type="date" id="newExpiry" style="flex:1;">
        <button class="btn-primary" onclick="updateExpiry()">저장</button>
        <button class="btn-outline" onclick="toggleDateEdit()">취소</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://voicebell-license-worker.leina0903.workers.dev';
let KEY = '';
let currentEmail = '';

function login() {
  const k = document.getElementById('adminKeyInput').value.trim();
  if (!k) return toast('Admin Key를 입력하세요', true);
  KEY = k;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainArea').style.display = 'block';
  toast('로그인됐어요');
}

async function search() {
  const email = document.getElementById('searchEmail').value.trim().toLowerCase();
  if (!email) return toast('이메일을 입력하세요', true);

  try {
    const res = await fetch(`${WORKER}/admin/get?email=${encodeURIComponent(email)}`, {
      headers: { 'X-Admin-Key': KEY }
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);

    const data = await res.json();
    if (!data.found) {
      toast('등록된 고객이 없어요', true);
      document.getElementById('resultCard').classList.remove('show');
      return;
    }

    currentEmail = email;
    const expiry = data.expiresAt ? new Date(data.expiresAt) : null;
    const now = new Date();
    const isValid = expiry && expiry > now;
    const daysLeft = expiry ? Math.ceil((expiry - now) / (1000*60*60*24)) : null;

    document.getElementById('resEmail').textContent = email;
    document.getElementById('resBadge').innerHTML = isValid
      ? '<span class="badge badge-active">✅ 활성</span>'
      : '<span class="badge badge-expired">❌ 만료</span>';
    document.getElementById('resExpiry').textContent = expiry
      ? expiry.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' }) : '-';
    document.getElementById('resDaysLeft').textContent = daysLeft !== null
      ? (daysLeft > 0 ? `D-${daysLeft}` : '오늘 만료') : '-';
    document.getElementById('resPcId').textContent = data.pcId || '미등록';

    if (expiry) document.getElementById('newExpiry').value = expiry.toISOString().substring(0,10);
    document.getElementById('resultCard').classList.add('show');
    document.getElementById('dateEdit').classList.remove('show');

  } catch(e) {
    toast('조회 중 오류가 발생했어요', true);
  }
}

function toggleDateEdit() {
  document.getElementById('dateEdit').classList.toggle('show');
}

async function updateExpiry() {
  const dateVal = document.getElementById('newExpiry').value;
  if (!dateVal) return toast('날짜를 선택하세요', true);
  const expiresAt = new Date(dateVal + 'T23:59:59.000Z').toISOString();
  try {
    const res = await fetch(`${WORKER}/admin/set-expiry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail, expiresAt })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) { toast('만료일이 변경됐어요'); document.getElementById('dateEdit').classList.remove('show'); search(); }
    else toast('변경 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function resetPc() {
  if (!confirm(`${currentEmail}의 PC ID를 초기화할까요?`)) return;
  try {
    const res = await fetch(`${WORKER}/admin/reset-pc`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) { toast('PC ID가 초기화됐어요'); search(); }
    else toast('초기화 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

async function expireNow() {
  if (!confirm(`${currentEmail}의 라이선스를 즉시 만료할까요?`)) return;
  try {
    const res = await fetch(`${WORKER}/admin/set-expiry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': KEY },
      body: JSON.stringify({ email: currentEmail, expiresAt: new Date(0).toISOString() })
    });
    if (res.status === 401) return toast('Admin Key가 올바르지 않아요', true);
    const data = await res.json();
    if (data.success) { toast('즉시 만료 처리됐어요'); search(); }
    else toast('처리 실패: ' + (data.reason ?? ''), true);
  } catch(e) { toast('오류가 발생했어요', true); }
}

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}
</script>
</body>
</html>
