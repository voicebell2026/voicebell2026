<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBell Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f4f1;
    color: #2C2318;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 420px;
  }
  h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  p  { font-size: 0.85rem; color: #888; margin-bottom: 28px; }
  label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e0ddd8;
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 14px;
    background: #faf9f7;
  }
  input:focus { border-color: #2C2318; background: #fff; }
  button {
    width: 100%;
    padding: 12px;
    background: #2C2318;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.85; }
  .result {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.875rem;
    display: none;
  }
  .result.ok    { background: #e8f5e9; color: #2e7d32; }
  .result.error { background: #fce4ec; color: #c62828; }
</style>
</head>
<body>
<div class="card">
  <h1>VoiceBell Admin</h1>
  <p>PC 교체 요청 고객의 이메일을 입력하세요</p>

  <label>Admin Key</label>
  <input type="password" id="adminKey" placeholder="Admin Key">

  <label>고객 이메일</label>
  <input type="email" id="email" placeholder="customer@example.com" onkeydown="if(event.key==='Enter') resetPc()">

  <button onclick="resetPc()">PC 초기화</button>

  <div class="result" id="result"></div>
</div>

<script>
const WORKER_URL = 'https://voicebell-license-worker.leina0903.workers.dev';

async function resetPc() {
  const adminKey = document.getElementById('adminKey').value.trim();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const result   = document.getElementById('result');

  if (!adminKey || !email) {
    show('Admin Key와 이메일을 모두 입력하세요', false);
    return;
  }

  try {
    const res = await fetch(`${WORKER_URL}/admin/reset-pc`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
      body: JSON.stringify({ email })
    });

    if (res.status === 401) { show('Admin Key가 올바르지 않아요', false); return; }

    const data = await res.json();
    if (data.success) {
      show(`✅ ${email} — PC 초기화 완료`, true);
      document.getElementById('email').value = '';
    } else {
      show('등록된 이메일을 찾을 수 없어요', false);
    }
  } catch (e) {
    show('오류가 발생했어요', false);
  }
}

function show(msg, ok) {
  const el = document.getElementById('result');
  el.textContent = msg;
  el.className = 'result ' + (ok ? 'ok' : 'error');
  el.style.display = 'block';
}
</script>
</body>
</html>
